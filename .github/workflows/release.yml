name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build and test
        run: mvn -B verify

      - name: Build distribution
        run: make dist

      - name: Debug dist contents
        run: ls -lah dist/ && du -sh dist/jre || echo "no jre dir"

      - name: Package archives
        run: |
          tar czf jazzysync-linux-x64.tar.gz -C dist .
          (cd dist && zip -r ../jazzysync-linux-x64.zip .)
          ls -lah *.tar.gz *.zip || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            jazzysync-linux-x64.tar.gz
            jazzysync-linux-x64.zip
          generate_release_notes: true
