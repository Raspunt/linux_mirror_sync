name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build and test
        run: mvn -B verify

      - name: Build distribution
        run: make dist

      - name: Test CLI
        run: |
          ./dist/jazzy --help || true
          ./dist/jazzy list || true

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: jazzysync-dist
          path: dist/
          retention-days: 7
